# 股市复盘工作流配置
# 修改后不需要重启任何进程，脚本每次运行读取最新版本

biliup:
  base_dir: ~/Movies/bilive-recoder/backup    # biliup.rs 的录播落盘目录

notify:
  lark_chat_id: "oc_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"  # 飞书目标群 chat_id
  video_retention_days: 60                              # 旧报告保留天数（清理用）
  max_message_chars: 30000                              # 文本消息阈值，超长发文件

discover:
  max_retries: 3   # 失败次数上限；超过则视为永久失败、不再重新返回
